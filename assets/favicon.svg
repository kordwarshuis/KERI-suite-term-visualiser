<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg" cx="40%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#0d1540"/>
      <stop offset="100%" stop-color="#050818"/>
    </radialGradient>
    <!-- Nebula glow -->
    <radialGradient id="neb" cx="55%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#3a1060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#05081a" stop-opacity="0"/>
    </radialGradient>
    <!-- Node glow filters -->
    <filter id="glow-hub" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <rect width="32" height="32" rx="5" fill="url(#neb)"/>

  <!-- Background stars -->
  <circle cx="3"  cy="4"  r="0.5" fill="white" opacity="0.55"/>
  <circle cx="9"  cy="2"  r="0.4" fill="white" opacity="0.45"/>
  <circle cx="27" cy="5"  r="0.5" fill="white" opacity="0.60"/>
  <circle cx="30" cy="12" r="0.4" fill="white" opacity="0.40"/>
  <circle cx="28" cy="27" r="0.5" fill="white" opacity="0.50"/>
  <circle cx="2"  cy="25" r="0.4" fill="white" opacity="0.45"/>
  <circle cx="5"  cy="14" r="0.35" fill="white" opacity="0.35"/>
  <circle cx="21" cy="3"  r="0.35" fill="white" opacity="0.40"/>
  <circle cx="13" cy="29" r="0.4" fill="white" opacity="0.40"/>
  <circle cx="26" cy="20" r="0.35" fill="white" opacity="0.35"/>
  <circle cx="7"  cy="29" r="0.4" fill="#c8e0ff" opacity="0.55" filter="url(#glow-sm)"/>
  <circle cx="24" cy="8"  r="0.5" fill="#c8e0ff" opacity="0.65" filter="url(#glow-sm)"/>

  <!-- Constellation edges (faint blue lines) -->
  <!-- hub → node-keri -->
  <line x1="16" y1="16" x2="9"  y2="9"  stroke="#4080cc" stroke-width="0.7" opacity="0.55"/>
  <!-- hub → node-acdc -->
  <line x1="16" y1="16" x2="23" y2="9"  stroke="#2090cc" stroke-width="0.7" opacity="0.55"/>
  <!-- hub → node-cesr -->
  <line x1="16" y1="16" x2="23" y2="23" stroke="#cc6010" stroke-width="0.7" opacity="0.45"/>
  <!-- hub → node-ks -->
  <line x1="16" y1="16" x2="9"  y2="23" stroke="#9020cc" stroke-width="0.7" opacity="0.45"/>
  <!-- cross edge keri-acdc -->
  <line x1="9"  y1="9"  x2="23" y2="9"  stroke="#4080cc" stroke-width="0.45" opacity="0.30" stroke-dasharray="1.5 1.5"/>
  <!-- cross edge cesr-ks -->
  <line x1="23" y1="23" x2="9"  y2="23" stroke="#cc6010" stroke-width="0.45" opacity="0.25" stroke-dasharray="1.5 1.5"/>

  <!-- Central hub node -->
  <circle cx="16" cy="16" r="3.4" fill="#1a2260" filter="url(#glow-hub)"/>
  <circle cx="16" cy="16" r="2.2" fill="#80c8ff" opacity="0.92" filter="url(#glow-hub)"/>

  <!-- KERI node (green) -->
  <circle cx="9" cy="9" r="2.4" fill="#0a1a30" filter="url(#glow-hub)"/>
  <circle cx="9" cy="9" r="1.6" fill="#00ff8c" opacity="0.88" filter="url(#glow-hub)"/>

  <!-- ACDC node (blue) -->
  <circle cx="23" cy="9" r="2.4" fill="#0a1530" filter="url(#glow-hub)"/>
  <circle cx="23" cy="9" r="1.6" fill="#00b4ff" opacity="0.88" filter="url(#glow-hub)"/>

  <!-- CESR node (orange) -->
  <circle cx="23" cy="23" r="2.4" fill="#201008" filter="url(#glow-hub)"/>
  <circle cx="23" cy="23" r="1.6" fill="#ff8800" opacity="0.88" filter="url(#glow-hub)"/>

  <!-- KERI Suite node (purple) -->
  <circle cx="9" cy="23" r="2.4" fill="#180a28" filter="url(#glow-hub)"/>
  <circle cx="9" cy="23" r="1.6" fill="#cc44ff" opacity="0.88" filter="url(#glow-hub)"/>
</svg>
