<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KERI Suite · Term Graph</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>

<!-- ── SVG ─────────────────────────────────────────────────────────────────── -->
<svg id="graph"></svg>

<!-- ── HUD ─────────────────────────────────────────────────────────────────── -->
<div class="panel" id="hud">
  <div id="hud-title">&#x2B22; KERI Suite Term Graph</div>
  <div id="status">INITIALISING…</div>
  <div id="legend"></div>
</div>

<!-- ── SEARCH ──────────────────────────────────────────────────────────────── -->
<div class="panel" id="search-panel">
  <span id="search-label">SEARCH&nbsp;›</span>
  <input id="search-input" type="text" placeholder="filter terms…" autocomplete="off" spellcheck="false" />
</div>

<!-- ── CONTROLS ────────────────────────────────────────────────────────────── -->
<div class="panel" id="controls">
  scroll &nbsp;·&nbsp; zoom<br>
  drag &nbsp;&nbsp;·&nbsp; pan / move node<br>
  hover &nbsp;·&nbsp; term details
</div>

<!-- ── GAME ────────────────────────────────────────────────────────────────── -->
<div class="panel" id="game-panel">
  <div id="game-title">&#x25C8; PATH HUNT</div>
  <div id="game-desc">Navigate from term to term<br>in the fewest clicks</div>
  <div id="game-info" style="display:none">
    <div class="game-row"><span class="game-lbl">START</span><span id="game-from">—</span></div>
    <div class="game-row"><span class="game-lbl">TARGET</span><span id="game-to">—</span></div>
    <div class="game-row"><span class="game-lbl">AT</span><span id="game-at">—</span></div>
    <div class="game-row"><span class="game-lbl">MOVES</span><span id="game-moves">0</span></div>
    <div class="game-row"><span class="game-lbl">BEST</span><span id="game-optimal">?</span></div>
  </div>
  <div id="game-result"></div>
  <div id="game-actions">
    <button class="game-btn" id="game-start-btn">NEW GAME</button>
    <button class="game-btn" id="game-give-up-btn" style="display:none">GIVE UP</button>
  </div>
</div>

<!-- ── TOOLTIP ─────────────────────────────────────────────────────────────── -->
<div id="tooltip"></div>

<script src="./index.js"></script>

</body>
</html>
